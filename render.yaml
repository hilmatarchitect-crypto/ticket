services:
  - type: web
    name: bookings-time-itinerary
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: AUTO_DELETE_DAYS
        value: "7"
      - key: DATABASE_URL
        fromDatabase:
          name: bookings-time-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: STAFF_USERNAME
        sync: false
      - key: STAFF_PASSWORD
        sync: false

databases:
  - name: bookings-time-db
    plan: free
    databaseName: bookings_time
    user: bookings_time
